task_id: customer_escalation_chain
difficulty: medium_hard
task_brief: >
  A billing dispute has been partially addressed, but the customer followed up with
  new information that changes the case. You must handle the customer follow-up message
  injected mid-episode, reassess priority, loop in the billing team lead for secondary
  approval, and close the case with a verified resolution. Coordination with multiple
  parties is required — acting unilaterally without escalation will fail the rubric.
primary_ticket_id: TICKET-4001
max_steps: 15
peer_inject:
  - at_step: 6
    from: customer
    message: >
      Hi, I just checked with our finance team and the overcharge is actually 480 USD,
      not 240. There were two billing cycles affected. Can you confirm and apply the
      correct amount?
    inject_into_observation: true
tickets:
  - ticket_id: TICKET-4001
    subject: "Overcharged on last two billing cycles after seat reduction"
    from_contact: "Jordan Avery <jordan@techpulse.io>"
    account_id: "acct_techpulse"
    summary: >
      Customer reports being overbilled after reducing seats from 20 to 10 two months
      ago. Initial estimate was one cycle overcharge but finance has flagged two cycles.
    priority: normal
    status: open
    tags: ["billing", "seat-change", "dispute"]
    allowed_actions:
      - open_ticket
      - inspect_record
      - search_kb
      - set_priority
      - set_status
      - add_tag
      - apply_credit
      - escalate
      - draft_reply
      - finalize_resolution
  - ticket_id: TICKET-4002
    subject: "Need help setting up two-factor authentication"
    from_contact: "Sam Rivera <sam@devcore.io>"
    account_id: "acct_devcore"
    summary: "Standard 2FA setup help request. Low priority."
    priority: low
    status: open
    tags: ["how-to", "security"]
    allowed_actions:
      - open_ticket
  - ticket_id: TICKET-4003
    subject: "Export download link expired"
    from_contact: "Nadia Singh <nadia@cloudloop.io>"
    account_id: "acct_cloudloop"
    summary: "Customer cannot download their data export. Standard support case."
    priority: low
    status: open
    tags: ["export", "how-to"]
    allowed_actions:
      - open_ticket
records:
  - record_id: acct_techpulse
    kind: account
    title: "Account snapshot: TechPulse"
    body: >
      Plan: Scale Annual. Current seat count: 10. Seat count until two months ago: 20.
      Billing contact Jordan Avery is approved. Account health: good. Two billing cycles
      potentially affected: February and March.
    related_ticket_ids: ["TICKET-4001"]
    keywords: ["account", "seats", "billing", "techpulse"]
  - record_id: inv_feb_techpulse
    kind: invoice
    title: "Invoice INV-5581 (February)"
    body: >
      February invoice billed 20 seats at 40 USD each. Overcharge for 10 seats:
      400 USD. Seat reduction was confirmed effective Feb 1.
    related_ticket_ids: ["TICKET-4001"]
    keywords: ["invoice", "february", "credit", "billing"]
  - record_id: inv_mar_techpulse
    kind: invoice
    title: "Invoice INV-5702 (March)"
    body: >
      March invoice billed 20 seats at 40 USD each. Overcharge for 10 seats:
      400 USD. System did not pick up seat reduction until April billing cycle.
    related_ticket_ids: ["TICKET-4001"]
    keywords: ["invoice", "march", "credit", "billing"]
  - record_id: billing_approval_policy
    kind: contract
    title: "Billing correction approval policy"
    body: >
      Credits above 400 USD require secondary approval from the billing team lead
      before issuance. Support agents must escalate to billing_ops for any credit
      exceeding 400 USD. Single-cycle corrections under 400 USD may be self-approved.
    related_ticket_ids: ["TICKET-4001"]
    keywords: ["policy", "credit", "approval", "billing_ops"]
kb_articles:
  - article_id: kb_multi_cycle_credit
    title: "Multi-cycle billing corrections"
    summary: "How to handle credits spanning more than one invoice cycle."
    content: >
      When a seat reduction affects multiple billing cycles, calculate the overcharge
      for each cycle separately. Total credits above 400 USD require billing_ops
      escalation and approval before applying. Document both invoice IDs in the ticket.
    keywords: ["credit", "multi-cycle", "billing", "approval", "invoice"]
rubric:
  - check_id: select_primary
    label: "Select the primary billing dispute ticket"
    weight: 0.10
    kind: selected_ticket
    params:
      ticket_id: TICKET-4001
  - check_id: inspect_required_records
    label: "Inspect account and both invoice records"
    weight: 0.20
    kind: viewed_records_all
    params:
      record_ids: ["acct_techpulse", "inv_feb_techpulse", "inv_mar_techpulse"]
  - check_id: handle_customer_follow_up
    label: "Reassess after customer follow-up (set high priority)"
    weight: 0.15
    kind: ticket_priority
    params:
      ticket_id: TICKET-4001
      priority: "high"
  - check_id: escalate_for_approval
    label: "Escalate to billing_ops for high-value credit approval"
    weight: 0.20
    kind: escalation_team
    params:
      escalation_team: "billing_ops"
  - check_id: apply_correct_credit
    label: "Apply the correct total credit (480 USD) after follow-up"
    weight: 0.15
    kind: exact_credit
    params:
      ticket_id: TICKET-4001
      amount: 480.0
      currency: "USD"
  - check_id: use_reply_template
    label: "Use the multi-cycle billing resolution reply template"
    weight: 0.05
    kind: reply_template
    params:
      template_id: "multi_cycle_billing_resolution"
  - check_id: include_reply_items
    label: "Include key reply points for multi-cycle dispute"
    weight: 0.10
    kind: reply_contains
    params:
      checklist:
        - "acknowledge_multi_cycle_error"
        - "confirm_total_credit_amount"
        - "reference_approval_escalation"
        - "explain_next_invoice"
  - check_id: finalize_correctly
    label: "Finalize with multi-cycle resolution code"
    weight: 0.05
    kind: final_resolution_code
    params:
      resolution_code: "multi_cycle_credit_applied"
forbidden_actions:
  - action_type: apply_credit
    conditions:
      ticket_id: "TICKET-4001"
      amount: 240.0
    reason: "Applying the original estimate after customer corrected the amount is wrong."
    penalty: 0.15
    terminal: false
  - action_type: apply_credit
    conditions:
      ticket_id: "TICKET-4001"
    reason: "Credit above 400 USD requires billing_ops escalation first."
    penalty: 0.12
    terminal: false
    requires_escalation_first: true
reply_requirements:
  template_id: "multi_cycle_billing_resolution"
  checklist:
    - "acknowledge_multi_cycle_error"
    - "confirm_total_credit_amount"
    - "reference_approval_escalation"
    - "explain_next_invoice"
oracle_reference_path:
  - "open_ticket TICKET-4001"
  - "inspect_record acct_techpulse"
  - "inspect_record inv_feb_techpulse"
  - "inspect_record inv_mar_techpulse"
  - "search_kb multi-cycle credit"
  - "[peer_message injected at step 6]"
  - "set_priority high"
  - "escalate billing_ops"
  - "apply_credit 480 USD"
  - "add_tag credit-approved"
  - "set_status resolved"
  - "draft_reply multi_cycle_billing_resolution"
  - "finalize_resolution multi_cycle_credit_applied"
