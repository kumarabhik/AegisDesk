difficulty: hard
forbidden_actions:
- action_type: finalize_resolution
  conditions:
    resolution_code: resolved
  penalty: 0.3
  reason: Do not resolve a live data breach as standard support — security team must
    clear first.
  terminal: true
- action_type: apply_credit
  conditions: {}
  penalty: 0.1
  reason: Credits are not appropriate during an active security incident.
  terminal: false
investigation_phases:
- description: Identify the primary security ticket and confirm threat signals.
  label: Detection
  phase: 1
  rubric_check_ids:
  - select_primary
  - inspect_security_alert
- description: Escalate to security team and mark ticket urgent.
  label: Containment
  phase: 2
  rubric_check_ids:
  - escalate_to_security
  - set_urgent_priority
- description: Inspect audit log and affected account records to determine breach
    scope.
  label: Assessment
  phase: 3
  rubric_check_ids:
  - inspect_assessment_records
- description: Draft a structured breach notification response.
  label: Notification
  phase: 4
  rubric_check_ids:
  - use_reply_template
  - include_reply_items
- description: Finalize with the correct security escalation resolution code.
  label: Resolution
  phase: 5
  rubric_check_ids:
  - mark_escalated_status
  - finalize_correctly
kb_articles:
- article_id: kb_breach_response_protocol
  content: 'Phase 1 Detection: Confirm threat signals and open the incident ticket.
    Phase 2 Containment: Escalate to security team immediately; set urgent priority.
    Phase 3 Assessment: Inspect audit logs and affected records to determine scope.
    Phase 4 Notification: Draft a breach notification with incident ID, affected scope,
    and next steps. Phase 5 Resolution: Finalize as security_escalated; do not resolve
    as standard support until security team clears the case.

    '
  keywords:
  - breach
  - protocol
  - phases
  - security
  - response
  summary: Five-phase procedure for handling potential data breaches.
  title: Data breach response protocol
max_steps: 30
oracle_reference_path:
- open_ticket TICKET-7221
- inspect_record security_alert_crestline_722
- escalate security
- set_priority urgent
- inspect_record audit_log_crestline
- inspect_record acct_crestline
- inspect_record approved_contacts_crestline
- inspect_record affected_data_scope
- search_kb breach response protocol
- add_tag security-incident
- draft_reply breach_notification_response
- set_status escalated
- finalize_resolution security_escalated
