  checklist:
  - confirm_incident_detected
  - state_containment_action
  - describe_affected_scope
  - reference_security_escalation
  - provide_next_steps
  template_id: breach_notification_response
rubric:
- check_id: select_primary
  kind: selected_ticket
  label: Select the security incident ticket
  params:
    ticket_id: TICKET-7221
  weight: 0.1
- check_id: inspect_security_alert
  kind: viewed_records_all
  label: Inspect the security alert record
  params:
    record_ids:
    - security_alert_crestline_722
  weight: 0.1
- check_id: escalate_to_security
  kind: escalation_team
  label: Escalate to the security team
  params:
    escalation_team: security
  weight: 0.15
- check_id: set_urgent_priority
  kind: ticket_priority
  label: Set ticket priority to urgent
  params:
    priority: urgent
    ticket_id: TICKET-7221
  weight: 0.1
- check_id: inspect_assessment_records
  kind: viewed_records_all
  label: Inspect audit log, account, contacts, and data scope records
  params:
    record_ids:
    - audit_log_crestline
    - acct_crestline
    - approved_contacts_crestline
    - affected_data_scope
  weight: 0.2
- check_id: use_reply_template
  kind: reply_template
  label: Use the breach notification reply template
  params:
    template_id: breach_notification_response
  weight: 0.05
- check_id: include_reply_items
  kind: reply_contains
  label: Include key breach notification reply points
  params:
    checklist:
    - confirm_incident_detected
    - state_containment_action
    - describe_affected_scope
    - reference_security_escalation
    - provide_next_steps
  weight: 0.15
- check_id: mark_escalated_status
  kind: ticket_status
  label: Mark ticket as escalated
  params:
    status: escalated
    ticket_id: TICKET-7221
  weight: 0.1
- check_id: finalize_correctly
  kind: final_resolution_code
  label: Finalize with security escalation resolution code
  params:
    resolution_code: security_escalated
  weight: 0.05
task_brief: 'A potential data breach has been reported. This is a multi-phase investigation
  requiring: (1) Detection — identify and open the incident ticket, confirm threat
  signals; (2) Containment — escalate to security team, flag account; (3) Assessment
  — inspect audit logs and affected records to determine scope; (4) Notification —
  draft a structured breach-response communication; (5) Resolution — finalize with
  the correct security resolution code. Phases must be completed in order. Skipping
  ahead without completing earlier phases will result in partial credit only.

  '
task_id: data_breach_response_lifecycle
