    2: Check the partner contract for entitlement. Step 3: Check the current policy
    window (world context) for any pauses. Step 4: If a policy review is active, route
    to billing_ops with usage data attached. Step 5: Do NOT self-approve extended
    access — all requests above standard tier require legal + billing sign-off, especially
    during a review window.

    '
