- body: 'Invoice INV-4598: 750 USD due May 5, 2026. Payment received May 12, 2026
    (7 days late, 5 days after suspension). Payment cleared and confirmed. Account
    balance: 0 USD outstanding.

    '
  keywords:
  - invoice
