    - confirm_payment_received
    - confirm_service_reinstated
    - confirm_data_retained
    - explain_next_billing_cycle
  weight: 0.15
- check_id: finalize_correctly
  kind: final_resolution_code
  label: Finalize with reinstatement resolved code
  params:
    resolution_code: account_reinstated
  weight: 0.05
task_brief: 'A customer account was suspended due to non-payment. The customer has
  now paid and is requesting reinstatement. You must verify payment status, confirm
  the account is eligible for reinstatement per the current policy window, and reactivate
  service. The world state indicates a policy grace period is currently active, which
  affects whether reinstatement can proceed immediately or requires approval. Do not
  reinstate until payment is verified and the policy window is confirmed.

  '
task_id: service_reinstatement_review
