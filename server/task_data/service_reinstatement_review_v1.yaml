  title: Invoice INV-4598 (May)
- body: 'Standard reinstatement: payment must be received within 30 days of suspension.
    Standard cases require billing_ops approval. Exception: during the Q2 retention
    grace period, accounts that pay within 15 days of suspension qualify for immediate
    reinstatement without approval. ClearPath SaaS paid 5 days post-suspension, which
    qualifies for the grace period exception.

    '
  keywords:
  - reinstatement
  - policy
  - grace
  - approval
  - suspension
  kind: contract
  record_id: reinstatement_policy
  related_ticket_ids:
  - TICKET-4598
  title: 'Reinstatement policy: suspension and recovery'
reply_requirements:
  checklist:
  - confirm_payment_received
  - confirm_service_reinstated
  - confirm_data_retained
  - explain_next_billing_cycle
  template_id: account_reinstatement_confirmation
rubric:
- check_id: select_primary
  kind: selected_ticket
  label: Select the reinstatement request ticket
  params:
    ticket_id: TICKET-4598
  weight: 0.1
- check_id: inspect_required_records
  kind: viewed_records_all
