    - acct_clearpath
    - inv_may_clearpath
  weight: 0.25
- check_id: inspect_policy_record
  kind: viewed_records_all
  label: Inspect reinstatement policy to confirm grace period eligibility
  params:
    record_ids:
    - reinstatement_policy
  weight: 0.15
- check_id: add_reinstated_tag
  kind: tag_added
  label: Tag ticket as reinstated
  params:
    tag: reinstated
    ticket_id: TICKET-4598
  weight: 0.15
- check_id: resolve_ticket
  kind: ticket_status
  label: Mark ticket resolved
  params:
    status: resolved
    ticket_id: TICKET-4598
  weight: 0.1
- check_id: use_reply_template
  kind: reply_template
  label: Use the reinstatement confirmation reply template
  params:
